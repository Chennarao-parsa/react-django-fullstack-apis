<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Application</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .h1 {
            text-align: center;
            color: rgb(27, 40, 224);
            margin-top: 40px;
        }

        .box {
            width: 350px;
            background-color: bisque;
            padding: 25px;
            margin: 40px auto;
            border-radius: 20px;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 6px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        input[type="submit"] {
            background-color: rgb(27, 40, 224);
            color: white;
            border: none;
            padding: 8px;
            cursor: pointer;
            border-radius: 5px;
        }

        input[type="submit"]:hover {
            background-color: darkblue;
        }

        .msg {
            text-align: center;
            color: green;
        }
    </style>
</head>

<body>

<header class="h1">
    <h1><u>Employee Application</u></h1>
</header>

<main class="box">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <label>empno :</label>
        <input type="text" name="empno" required>

        <label>emp_name :</label>
        <input type="text" name="ename" required>

        <label>salary :</label>
        <input type="text" name="salary" required>

     

        <label>department :</label>
        <select name="dno" required>
            <option value="">

            </option>
            {% for dept in departments %}
                <option value="{{ dept.deptno }}">
                    {{ dept.dname }}
                </option>
            {% endfor %}
        </select>

        <label>pic :</label>
        <input type="file" name="epic">

        <label>video :</label>
        <input type="file" name="evideo">

        <input type="submit" value="insert">
    </form>

    {% if messages %}
        {% for msg in messages %}
            <p class="msg">{{ msg }}</p>
        {% endfor %}
    {% endif %}
</main>

</body>
</html>
