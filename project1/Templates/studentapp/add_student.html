{% extends 'base.html' %}


{% block main %}


<h2>Add Student</h2>
<form method="POST">
    {% csrf_token %}
    Name: <input type="text" name="name"><br><br>
    Age: <input type="number" name="age"><br><br>
    Course: <input type="text" name="course"><br><br>
    <button type="submit">Add Student</button>
</form>

<a href="{% url 'list_students' %}">View All Students</a>

{% endblock %}
