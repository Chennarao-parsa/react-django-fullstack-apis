<!DOCTYPE html>
<html>
<head>
    <title>Delete Student</title>
</head>
<body>

    <h2>Confirm Delete</h2>

    <p>Are you sure you want to delete <strong>{{ student.name }}</strong>?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
        <a href="{% url 'list_students' %}">Cancel</a>
    </form>

</body>
</html>
