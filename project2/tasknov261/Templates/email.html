<!DOCTYPE html>
<html>
<head>
    <title>Email Submission</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        header {
            background-color: white;
            padding: 30px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
        }

        input[type="email"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        h2 {
            margin-top: 20px;
            color: green;
        }
    </style>
</head>

<body>
    <header>
        <h1>Email Submission</h1>

        <main>
            <form action="" method="POST">
                {% csrf_token %}

                <label for="email">
                    Enter your email:
                    <input type="email" id="email" name="email" required>
                </label>

                <button type="submit">Submit</button>
            </form>

            {% if email %}
                <h2>Submitted Email: {{ email }}</h2>
            {% endif %}
        </main>
    </header>
</body>
</html>
