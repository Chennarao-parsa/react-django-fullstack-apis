<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Text Reversal</title>
    <style>
        body {
            text-align: center;

        }
    
        input[type="text"] {
            width: 50vw;
            padding: 1vw;
            font-size: 16px;
            background-color: rgb(255, 102, 0);
            color:blueviolet
        }
        input[type="submit"] {
            padding: 10px 15px;
            font-size: 16px;
            background-color: yellow;
            color: red;

        }
        #t1{
            margin-top: 5vh;
        
        }

    </style>

</head>
<body>
    
            <form action="" method="POST">
                {% csrf_token %}

                <input type="text" name="t1" id="t1">
                <input type="submit" value="submit">
            </form>
            
    {% if result %}
        <h3>Reversed Output:</h3>
        <p>{{ result }}</p>
    {% endif %}
          
      
</body>
</html>
